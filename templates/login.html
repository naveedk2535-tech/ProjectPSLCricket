<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PSL Cricket Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0a0a1a 0%, #0d1f0d 50%, #0a0a1a 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-md">
        <!-- Logo / Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-gradient-to-br from-green-600 to-green-800 mb-4 shadow-lg shadow-green-900/50">
                <svg class="w-10 h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 2 C12 2 14 8 14 12 C14 16 12 22 12 22" stroke="currentColor" stroke-width="1.5" fill="none"/>
                    <path d="M2 12 h20" stroke="currentColor" stroke-width="1.5"/>
                    <path d="M3.5 7 h17" stroke="currentColor" stroke-width="1"/>
                    <path d="M3.5 17 h17" stroke="currentColor" stroke-width="1"/>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-white">PSL <span class="text-yellow-400">2026</span></h1>
            <p class="text-gray-400 mt-1">Cricket Prediction & Analytics</p>
        </div>

        <!-- Login card -->
        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-semibold text-white mb-6 text-center">Sign In</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="mb-4 p-3 rounded-lg text-sm
                        {% if category == 'error' %}bg-red-900/50 border border-red-700 text-red-300
                        {% else %}bg-blue-900/50 border border-blue-700 text-blue-300{% endif %}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-400 mb-1.5">Username</label>
                    <input type="text" id="username" name="username" required autofocus
                           class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="Enter your username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-1.5">Password</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
                           placeholder="Enter your password">
                </div>
                <button type="submit"
                        class="w-full py-3 bg-gradient-to-r from-green-600 to-green-700 hover:from-green-500 hover:to-green-600 text-white font-semibold rounded-lg transition-all shadow-lg shadow-green-900/30 hover:shadow-green-900/50">
                    Sign In
                </button>
            </form>
        </div>

        <!-- Tagline -->
        <p class="text-center text-gray-600 text-xs mt-6">Powered by ML Analytics &bull; Ensemble Prediction Engine</p>
    </div>
</body>
</html>
